<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Omawari Map</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >
    <link rel="stylesheet" href="css/style.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar" aria-label="顶栏占位">
        <div class="placeholder-title">Topbar placeholder</div>
      </header>

      <main class="workspace">
        <aside class="sidebar" aria-label="侧栏占位">
          <div class="placeholder-title">Sidebar placeholder</div>
        </aside>

        <section class="map-pane" aria-label="地图">
          <div id="map"></div>
        </section>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
